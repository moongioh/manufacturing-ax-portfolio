<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>워크스루 — 문서허브 (시멘틱 검색·RAG)</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,300..600,0..1,0" rel="stylesheet">
<style>
/* inlined: assets/canon-tokens.css */
/* canon-tokens.css — Claude Design 템플릿(.dc)이 기대하는 토큰 파일명.
   실체는 워크스페이스 SSoT 포인터 (plan workspace/0025 D5 — 값 복제 금지).
   raw .dc 라이브 프리뷰(http 서빙)가 이 상대경로를 로드하고,
   dc-compile.mjs는 @import를 따라가 최종 값을 번들에 인라인한다. */
/* =============================================================
   DESIGN CANON v2 — 문서 양식 공용 토큰 SSoT (plan workspace/0025)
   원본: 사용자 제작 Claude Design 템플릿 assets/템플릿/정본 쇼케이스.dc.html
   적용 대상: 모든 문서 산출물(교육·워크스루·이력서·보고서·기술문서).
   ERP React 앱(카테고리 1)은 대상 아님 — M3 --md-sys-* 체계 유지.

   사용법(Track B 자유양식):
     <link rel="stylesheet" href=".../design-tokens-canon-v2.css">
     <body> 안 최상위 래퍼에 class="canon" (+ data-theme="dark" 선택)
   Raw hex는 이 파일(토큰 정의부)에서만 허용 — 소비측은 var(--cn-*)만.
   v1(design-tokens-creative.css)·techspec.css는 legacy — 신규 사용 금지.
   ============================================================= */

.canon{
  --cn-primary:#3B82F6; --cn-primary-deep:#2563EB; --cn-link:#2563EB;
  --cn-bg:#f5f8fc; --cn-card:#ffffff; --cn-card-glass:rgba(255,255,255,.82);
  --cn-line:#e2e9f2; --cn-line-strong:#cbd7e4;
  --cn-ink:#1c2a3d; --cn-muted:#5b6b80; --cn-faint:#8b99ac;
  --cn-tint:#eaf1fb; --cn-tint-deep:#dbe7f9;
  --cn-purple:#8B5CF6; --cn-teal:#14B8A6; --cn-amber:#F59E0B; --cn-rose:#F43F5E; --cn-green:#10B981;
  --cn-code-bg:#f1f5fa; --cn-code-ink:#334155;
  --cn-shadow-1:0 1px 2px rgba(28,42,61,.05),0 2px 8px rgba(28,42,61,.04);
  --cn-shadow-2:0 2px 4px rgba(28,42,61,.05),0 10px 28px rgba(37,99,235,.08);
  --cn-mesh:radial-gradient(at 90% -4%,rgba(59,130,246,.09) 0,transparent 50%),radial-gradient(at 2% 100%,rgba(139,92,246,.08) 0,transparent 46%),#f5f8fc;
  --cn-ease:cubic-bezier(.2,0,0,1);
  --cn-grad-id:linear-gradient(135deg,#3B82F6,#7C3AED);
}
.canon[data-theme="dark"]{
  --cn-primary:#6EA3F7; --cn-primary-deep:#8AB4F8; --cn-link:#8AB4F8;
  --cn-bg:#0e1420; --cn-card:#161e2e; --cn-card-glass:rgba(22,30,46,.82);
  --cn-line:#243146; --cn-line-strong:#31415c;
  --cn-ink:#e8edf6; --cn-muted:#98a8bf; --cn-faint:#67788f;
  --cn-tint:#1a2740; --cn-tint-deep:#20304f;
  --cn-code-bg:#111a2a; --cn-code-ink:#b7c5da;
  --cn-shadow-1:0 1px 2px rgba(0,0,0,.3),0 2px 8px rgba(0,0,0,.25);
  --cn-shadow-2:0 2px 4px rgba(0,0,0,.3),0 12px 30px rgba(0,0,0,.4);
  --cn-mesh:radial-gradient(at 90% -4%,rgba(59,130,246,.12) 0,transparent 50%),radial-gradient(at 2% 100%,rgba(139,92,246,.1) 0,transparent 46%),#0e1420;
}

/* ── 베이스 (쇼케이스 helmet 규칙 승계) ── */
.canon{
  min-height:100vh;background:var(--cn-mesh);background-attachment:fixed;
  color:var(--cn-ink);font-size:15px;line-height:1.7;
  font-family:'Pretendard Variable',Pretendard,'Noto Sans KR',sans-serif;
  -webkit-font-smoothing:antialiased;
  transition:background .25s,color .25s;
}
.canon a{color:var(--cn-link);text-decoration:none}
.canon a:hover{color:var(--cn-primary)}
.canon .mi{font-family:'Material Symbols Outlined';font-weight:normal;font-style:normal;line-height:1;display:inline-block;vertical-align:-0.15em;font-variation-settings:'FILL' 0,'wght' 400}

/* ── 인쇄 (DESIGN.md §3E) — 다크로 보던 중 인쇄해도 종이는 라이트 ── */
@media print{
  .canon,.canon[data-theme="dark"]{
    --cn-primary:#3B82F6; --cn-primary-deep:#2563EB; --cn-link:#2563EB;
    --cn-bg:#ffffff; --cn-card:#ffffff; --cn-card-glass:#ffffff;
    /* 그림자 소실 → 보더가 경계 승계(한 단계 진하게) */
    --cn-line:#cbd7e4; --cn-line-strong:#9fb1c5;
    --cn-ink:#1c2a3d; --cn-muted:#5b6b80; --cn-faint:#8b99ac;
    --cn-tint:#eaf1fb; --cn-tint-deep:#dbe7f9;
    --cn-code-bg:#f1f5fa; --cn-code-ink:#334155;
    --cn-shadow-1:none; --cn-shadow-2:none;
    --cn-mesh:#ffffff;
    background:#fff;
  }
}


</style>
<style>
html,body{margin:0;padding:0}
body{font-family:'Pretendard Variable',Pretendard,'Noto Sans KR',sans-serif;-webkit-font-smoothing:antialiased}
a{color:var(--cn-link,#2563EB);text-decoration:none}
a:hover{color:var(--cn-primary,#3B82F6)}
.mi{font-family:'Material Symbols Outlined';font-weight:normal;font-style:normal;line-height:1;display:inline-block;vertical-align:-0.15em;font-variation-settings:'FILL' 0,'wght' 400}
@media (max-width:960px){ .cn-rail{display:none!important} .cn-main{padding-left:32px!important} }
@keyframes cnFlow{to{background-position:24px 0}}
svg text{font-family:'Pretendard Variable',Pretendard,'Noto Sans KR',sans-serif}
svg .mono{font-family:'JetBrains Mono',monospace}
</style>
</head>
<body>
<!-- dc-compile.mjs 번들 (plan workspace/0025) — 원본: 워크스루-문서허브.dc.html · 재편집은 원본 .dc에서 -->
<script type="text/x-dc-template">
<div class="canon" data-theme="{{ theme }}" style="min-height:100vh;background:var(--cn-mesh);background-attachment:fixed;color:var(--cn-ink);font-size:15px;line-height:1.7;transition:background .25s,color .25s">

  <nav class="cn-rail" style="position:fixed;top:0;left:0;bottom:0;width:236px;box-sizing:border-box;padding:20px 14px;display:flex;flex-direction:column;gap:2px;background:var(--cn-card-glass);backdrop-filter:blur(14px);border-right:1px solid var(--cn-line);z-index:50">
    <div style="display:flex;align-items:center;gap:10px;padding:4px 8px 14px;border-bottom:1px solid var(--cn-line);margin-bottom:10px">
      <div style="width:32px;height:32px;border-radius:9px;display:grid;place-items:center;color:#fff;background:var(--cn-grad-id,linear-gradient(135deg,#3B82F6,#7C3AED));flex:none"><span class="mi" style="font-size:18px">travel_explore</span></div>
      <div>
        <div style="font-size:13.5px;font-weight:800;letter-spacing:-.01em">문서허브</div>
        <div style="font-size:10.5px;color:var(--cn-faint);font-family:'JetBrains Mono',monospace">walkthrough</div>
      </div>
    </div>
    <div style="font-size:10px;font-weight:700;letter-spacing:.08em;color:var(--cn-faint);text-transform:uppercase;padding:8px 10px 4px">목차</div>
    <sc-for list="{{ navItems }}" as="nv" hint-placeholder-count="7">
      <a href="{{ nv.href }}" style="display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:8px;font-size:12.5px;font-weight:600;color:var(--cn-ink)" style-hover="background:var(--cn-tint);color:var(--cn-primary-deep)">
        <span class="mi" style="font-size:16px;color:var(--cn-primary)">{{ nv.icon }}</span>{{ nv.label }}
      </a>
    </sc-for>
    <div style="flex:1"></div>
    <a href="../index.html" style="display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:8px;font-size:12.5px;font-weight:600;color:var(--cn-muted)" style-hover="background:var(--cn-tint);color:var(--cn-primary-deep)">
      <span class="mi" style="font-size:16px;color:var(--cn-primary)">arrow_back</span>포트폴리오 홈
    </a>
    <button onClick="{{ toggleTheme }}" style="display:flex;align-items:center;justify-content:center;gap:7px;padding:9px 14px;border-radius:999px;border:1px solid var(--cn-line-strong);background:var(--cn-card);color:var(--cn-ink);font-family:inherit;font-size:12px;font-weight:700;cursor:pointer" style-hover="border-color:var(--cn-primary)">
      <span class="mi" style="font-size:16px">{{ themeIcon }}</span>{{ themeLabel }}
    </button>
  </nav>

  <main class="cn-main" style="padding:44px 40px 90px 284px;max-width:1280px;margin:0 auto;box-sizing:border-box">

    <header style="border-radius:18px;padding:34px 36px;margin-bottom:20px;position:relative;overflow:hidden;background:linear-gradient(120deg,var(--cn-tint) 0%,var(--cn-bg) 70%);border:1px solid var(--cn-line);box-shadow:var(--cn-shadow-1)">
      <div style="position:absolute;inset:0 0 auto 0;height:3px;background:linear-gradient(90deg,var(--cn-primary),var(--cn-purple),var(--cn-teal))"></div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:11.5px;font-weight:600;color:var(--cn-primary-deep);letter-spacing:.04em;margin-bottom:10px">WALKTHROUGH · 비정형 데이터 · 시멘틱 검색</div>
      <h1 style="margin:0 0 10px;font-size:34px;font-weight:800;letter-spacing:-.025em;line-height:1.25">문서허브 — 비정형 16GB를 검색 가능한 시멘틱 백본으로</h1>
      <p style="margin:0;max-width:680px;font-size:15px;color:var(--cn-muted)">제조·화학 중소기업 환경의 수년치 비정형 문서(hwp·PDF·Excel)를 정제 → 임베딩 → 하이브리드 검색 → 정본 관리로 잇는
        <b style="color:var(--cn-ink)">두 번째(비정형) 백본</b>입니다. 정형 온톨로지·ERP 백본과 나란히, 검색·정본·동기화를 시스템이 강제하도록 설계했습니다.</p>
      <div style="display:flex;gap:8px;margin-top:18px;flex-wrap:wrap">
        <span style="font-size:11px;font-weight:700;padding:4px 12px;border-radius:999px;background:var(--cn-tint-deep);color:var(--cn-primary-deep)">16GB→2,809문서</span>
        <span style="font-size:11px;font-weight:700;padding:4px 12px;border-radius:999px;background:var(--cn-tint-deep);color:var(--cn-primary-deep)">13,759청크·에러 0</span>
        <span style="font-size:11px;font-weight:700;padding:4px 12px;border-radius:999px;background:var(--cn-tint-deep);color:var(--cn-primary-deep)">읽기 7분</span>
      </div>
    </header>

    <div style="border-radius:12px;border:1px solid var(--cn-line);border-left:4px solid var(--cn-primary);background:var(--cn-card);padding:16px 19px;box-shadow:var(--cn-shadow-1);margin-bottom:44px;display:flex;gap:12px;align-items:flex-start">
      <span class="mi" style="font-size:20px;color:var(--cn-primary);flex:none;margin-top:2px">bolt</span>
      <div style="font-size:13px;line-height:1.75;color:var(--cn-muted)">
        <b style="color:var(--cn-ink)">TL;DR</b> —
        <b style="color:var(--cn-ink)">무엇</b>: 비정형 문서를 정제→임베딩→RRF 하이브리드 검색→정본 관리까지 잇는 검색 가능한 시멘틱 백본. ·
        <b style="color:var(--cn-ink)">왜</b>: 정형 백본과 달리 비정형 문서는 검색·정본·동기화를 시스템이 강제하지 않으면 담당자 교체·수작업 규율 붕괴로 반복해서 무너지는 구조였기 때문. ·
        <b style="color:var(--cn-ink)">결과</b>: 16GB→7.32GiB·2,809파일로 정제, 13,759청크 pgvector 적재 에러 0건, RRF 3채널 검색 + DB UNIQUE 제약으로 정본 슬롯을 강제합니다.
      </div>
    </div>

    <section id="s1" style="margin-bottom:48px">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:6px">
        <div style="width:30px;height:30px;border-radius:8px;display:grid;place-items:center;color:#fff;font-size:13px;font-weight:800;background:linear-gradient(135deg,#3B82F6,#2563EB)">1</div>
        <h2 style="margin:0;font-size:21px;font-weight:800;letter-spacing:-.02em">한 장 지도 — 코퍼스에서 세 출력까지</h2>
      </div>
      <p style="margin:0 0 18px 42px;font-size:12.5px;color:var(--cn-faint)">④ 검색 게이트를 지나면 질의응답·RAG 초안·정본 레지스트리 세 갈래로 갈라집니다. 아래 재생으로 단계별 설명을 볼 수 있습니다.</p>

      <div style="background:var(--cn-card);border:1px solid var(--cn-line);border-radius:14px;padding:24px;box-shadow:var(--cn-shadow-1)">
        <svg viewBox="0 0 1040 490" style="width:100%;height:auto;display:block">
          <defs>
            <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
              <path d="M0,0 L10,5 L0,10 z" fill="var(--cn-faint)"></path>
            </marker>
            <marker id="arrP" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
              <path d="M0,0 L10,5 L0,10 z" fill="var(--cn-primary)"></path>
            </marker>
            <marker id="arrTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
              <path d="M0,0 L10,5 L0,10 z" fill="var(--cn-teal)"></path>
            </marker>
            <marker id="arrPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
              <path d="M0,0 L10,5 L0,10 z" fill="var(--cn-purple)"></path>
            </marker>
            <marker id="arrAmber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
              <path d="M0,0 L10,5 L0,10 z" fill="var(--cn-amber)"></path>
            </marker>
          </defs>

          <!-- 증분 동기 (상단 SYNC 레이어) -->
          <text x="16" y="34" font-size="10.5" font-weight="700" letter-spacing="2" fill="var(--cn-faint)" class="mono">SYNC LAYER</text>
          <rect x="350" y="14" width="280" height="54" rx="12" fill="var(--cn-bg)" stroke="var(--cn-teal)" stroke-width="1.4"></rect>
          <text x="490" y="36" text-anchor="middle" font-size="13" font-weight="800" fill="var(--cn-ink)">증분 동기 (델타 ETL)</text>
          <text x="490" y="54" text-anchor="middle" font-size="10" fill="var(--cn-muted)" class="mono">인앱 업로드 → GCS SSoT · 근사중복 3층</text>
          <path d="M 460 68 C 400 95, 320 115, 250 148" fill="none" stroke="var(--cn-faint)" stroke-width="1.4" stroke-dasharray="6 5" marker-end="url(#arr)"></path>
          <text x="330" y="112" text-anchor="middle" font-size="10" fill="var(--cn-faint)">변경분 재유입</text>

          <!-- 메인 체인 -->
          <!-- ① 원본 -->
          <rect x="16" y="150" width="120" height="72" rx="12" fill="var(--cn-card)" stroke="var(--cn-line-strong)"></rect>
          <text x="76" y="180" text-anchor="middle" font-size="13" font-weight="800" fill="var(--cn-ink)">① 원본</text>
          <text x="76" y="200" text-anchor="middle" font-size="10" fill="var(--cn-muted)" class="mono">hwp·PDF·Excel</text>
          <line x1="136" y1="186" x2="156" y2="186" stroke="var(--cn-faint)" stroke-width="1.6" marker-end="url(#arr)"></line>
          <!-- ② 정제 -->
          <rect x="160" y="150" width="140" height="72" rx="12" fill="var(--cn-card)" stroke="var(--cn-line-strong)"></rect>
          <text x="230" y="180" text-anchor="middle" font-size="13" font-weight="800" fill="var(--cn-ink)">② 정제</text>
          <text x="230" y="200" text-anchor="middle" font-size="10" fill="var(--cn-muted)" class="mono">2,809문서 · 7.32GiB</text>
          <line x1="300" y1="186" x2="322" y2="186" stroke="var(--cn-faint)" stroke-width="1.6" marker-end="url(#arr)"></line>
          <!-- ③ 임베딩 -->
          <rect x="326" y="150" width="168" height="72" rx="12" fill="var(--cn-card)" stroke="var(--cn-line-strong)"></rect>
          <text x="410" y="180" text-anchor="middle" font-size="13" font-weight="800" fill="var(--cn-ink)">③ 임베딩</text>
          <text x="410" y="200" text-anchor="middle" font-size="10" fill="var(--cn-muted)" class="mono">13,759청크 · pgvector</text>
          <line x1="494" y1="186" x2="518" y2="186" stroke="var(--cn-primary)" stroke-width="1.8" marker-end="url(#arrP)"></line>
          <!-- ④ 검색 게이트 -->
          <rect x="522" y="140" width="188" height="92" rx="14" fill="var(--cn-tint)" stroke="var(--cn-primary)" stroke-width="2"></rect>
          <text x="616" y="170" text-anchor="middle" font-size="13.5" font-weight="800" fill="var(--cn-primary-deep)">④ 검색 게이트</text>
          <text x="616" y="190" text-anchor="middle" font-size="10.5" fill="var(--cn-primary-deep)" class="mono">RRF (rank fusion)</text>
          <text x="616" y="208" text-anchor="middle" font-size="10" fill="var(--cn-muted)">키워드+벡터+온톨로지 3채널</text>

          <!-- 3갈래 출력 -->
          <path d="M 710 160 C 726 130, 728 112, 742 104" fill="none" stroke="var(--cn-teal)" stroke-width="1.6" marker-end="url(#arrTeal)"></path>
          <line x1="710" y1="186" x2="742" y2="186" stroke="var(--cn-purple)" stroke-width="1.6" marker-end="url(#arrPurple)"></line>
          <path d="M 710 212 C 726 240, 728 258, 742 280" fill="none" stroke="var(--cn-amber)" stroke-width="1.6" marker-end="url(#arrAmber)"></path>

          <rect x="746" y="70" width="188" height="64" rx="12" fill="var(--cn-card)" stroke="var(--cn-teal)" stroke-width="1.4"></rect>
          <text x="840" y="96" text-anchor="middle" font-size="12.5" font-weight="800" fill="var(--cn-ink)">질의응답</text>
          <text x="840" y="116" text-anchor="middle" font-size="10" fill="var(--cn-muted)" class="mono">출처 인용</text>

          <rect x="746" y="154" width="188" height="64" rx="12" fill="var(--cn-card)" stroke="var(--cn-purple)" stroke-width="1.4"></rect>
          <text x="840" y="180" text-anchor="middle" font-size="12.5" font-weight="800" fill="var(--cn-ink)">RAG 초안</text>
          <text x="840" y="200" text-anchor="middle" font-size="10" fill="var(--cn-muted)" class="mono">generate · refine</text>

          <rect x="746" y="250" width="188" height="64" rx="12" fill="var(--cn-card)" stroke="var(--cn-amber)" stroke-width="1.4"></rect>
          <text x="840" y="276" text-anchor="middle" font-size="12.5" font-weight="800" fill="var(--cn-ink)">⑤ 정본 레지스트리</text>
          <text x="840" y="296" text-anchor="middle" font-size="10" fill="var(--cn-muted)" class="mono">UNIQUE 슬롯</text>

          <!-- LangGraph 판정 노트 -->
          <line x1="840" y1="314" x2="840" y2="332" stroke="var(--cn-faint)" stroke-width="1.4" marker-end="url(#arr)"></line>
          <rect x="746" y="332" width="188" height="50" rx="10" fill="var(--cn-bg)" stroke="var(--cn-line-strong)" stroke-dasharray="4 4"></rect>
          <text x="840" y="353" text-anchor="middle" font-size="11" font-weight="800" fill="var(--cn-ink)">LangGraph 판정</text>

        var node = { tag: m[2], attrs: attrs, children: [] };
        stack[stack.length - 1].children.push(node);
        if (!m[4] && !VOID[m[2].toLowerCase()]) stack.push(node);
      }
    }
    if (last < src.length) {
      var tail = src.slice(last);
      if (tail) stack[stack.length - 1].children.push({ text: decodeEnt(tail) });
    }
    return root;
  }

  /* ── 표현식 평가 ({{ }} 내부) — 스코프 체인은 프로토타입 체인으로 ── */
  var fnCache = {};
  function evalExpr(expr, scope) {
    var f = fnCache[expr] || (fnCache[expr] = new Function('__s', 'with(__s){return(' + expr + ')}'));
    try { return f(scope); }
    catch (e) { throw new Error('[dc] 표현식 평가 실패: {{ ' + expr + ' }} — ' + e.message); }
  }
  var MUSTACHE = /\{\{\s*([\s\S]+?)\s*\}\}/g;
  function interpolate(str, scope) {
    return str.replace(MUSTACHE, function (_, e) {
      var v = evalExpr(e, scope);
      return v == null ? '' : String(v);
    });
  }
  function soleExpr(str) {
    var m = /^\s*\{\{\s*([\s\S]+?)\s*\}\}\s*$/.exec(str);
    return m && m[1];
  }

  /* ── style-hover → 생성 클래스 (인라인 style은 :hover 불가) ── */
  var hoverMap = {}, hoverSeq = 0, hoverStyleEl = null;
  function hoverClass(css) {
    if (hoverMap[css]) return hoverMap[css];
    var cls = 'dc-hv' + (++hoverSeq);
    hoverMap[css] = cls;
    if (!hoverStyleEl) {
      hoverStyleEl = document.createElement('style');
      document.head.appendChild(hoverStyleEl);
    }
    hoverStyleEl.textContent += '.' + cls + ':hover{' + css + '}\n';
    return cls;
  }

  /* ── 트리 → DOM (out 배열에 push) ── */
  function build(node, scope, svgCtx, out) {
    if (node.text !== undefined) {
      out.push(document.createTextNode(node.text.indexOf('{{') >= 0 ? interpolate(node.text, scope) : node.text));
      return;
    }
    var tag = node.tag.toLowerCase();
    if (tag === 'sc-for') {
      var list = evalExpr(soleExpr(node.attrs.list || '') || 'null', scope) || [];
      var as = node.attrs.as || 'item';
      for (var i = 0; i < list.length; i++) {
        var s = Object.create(scope);
        s[as] = list[i];
        s[as + 'Index'] = i;
        for (var c = 0; c < node.children.length; c++) build(node.children[c], s, svgCtx, out);
      }
      return;
    }
    if (tag === 'sc-if') {
      if (evalExpr(soleExpr(node.attrs.value || '') || 'false', scope)) {
        for (var c2 = 0; c2 < node.children.length; c2++) build(node.children[c2], scope, svgCtx, out);
      }
      return;
    }
    if (tag.slice(0, 3) === 'sc-') {
      throw new Error('[dc] 미지원 DSL 태그: <' + node.tag + '> — support.js 서브셋(sc-for·sc-if)에 없음. 렌더러 확장 필요.');
    }
    var isSvg = svgCtx || tag === 'svg';
    var el = isSvg ? document.createElementNS(SVG_NS, node.tag) : document.createElement(tag);
    var events = null;
    for (var name in node.attrs) {
      var raw = node.attrs[name], lname = name.toLowerCase();
      if (lname.indexOf('hint-') === 0) continue;
      if (/^on[a-z]/.test(lname) && soleExpr(raw)) {
        var fn = evalExpr(soleExpr(raw), scope);
        if (typeof fn === 'function') { el[lname] = fn; (events = events || {})[lname] = fn; }
        continue;
      }
      if (lname === 'style-hover') {
        el.classList.add(hoverClass(raw.indexOf('{{') >= 0 ? interpolate(raw, scope) : raw));
        continue;
      }
      el.setAttribute(name, raw.indexOf('{{') >= 0 ? interpolate(raw, scope) : raw);
    }
    if (events) el.__dcEvents = events;
    var kids = [];
    for (var k = 0; k < node.children.length; k++) build(node.children[k], scope, isSvg, kids);
    for (var k2 = 0; k2 < kids.length; k2++) el.appendChild(kids[k2]);
    out.push(el);
  }

  /* ── 모프 (in-place 패치) — 전체 교체 대신 속성/텍스트만 갱신해
        CSS transition(게이지 채움·플로우 노드 점등 등)이 살아있게 한다 ── */
  function morph(live, fresh) {
    if (live.nodeType !== fresh.nodeType || (live.nodeType === 1 && live.nodeName !== fresh.nodeName)) {
      live.replaceWith(fresh);
      return;
    }
    if (live.nodeType === 3) {
      if (live.nodeValue !== fresh.nodeValue) live.nodeValue = fresh.nodeValue;
      return;
    }
    var i, a;
    for (i = live.attributes.length - 1; i >= 0; i--) {
      a = live.attributes[i];
      if (!fresh.hasAttribute(a.name)) live.removeAttribute(a.name);
    }
    for (i = 0; i < fresh.attributes.length; i++) {
      a = fresh.attributes[i];
      if (live.getAttribute(a.name) !== a.value) live.setAttribute(a.name, a.value);
    }
    var oe = live.__dcEvents || {}, ne = fresh.__dcEvents || {};
    for (var k1 in oe) if (!(k1 in ne)) live[k1] = null;
    for (var k2 in ne) live[k2] = ne[k2];
    live.__dcEvents = fresh.__dcEvents;
    var la = [].slice.call(live.childNodes), fa = [].slice.call(fresh.childNodes);
    for (i = 0; i < fa.length; i++) {
      if (i < la.length) morph(la[i], fa[i]);
      else live.appendChild(fa[i]);
    }
    for (i = la.length - 1; i >= fa.length; i--) live.removeChild(la[i]);
  }

  /* ── DCLogic 베이스 ── */
  function DCLogic(props) { this.props = props || {}; }
  DCLogic.prototype.setState = function (partial) {
    if (!this.state) this.state = {};
    Object.assign(this.state, partial);
    if (this.__dcRender) this.__dcRender();
  };

  function fail(e) {
    console.error(e);
    var box = document.createElement('div');
    box.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;background:#ba1a1a;color:#fff;font:600 13px/1.5 monospace;padding:10px 16px;white-space:pre-wrap';
    box.textContent = String(e && e.message || e);
    document.body.appendChild(box);
    throw e;
  }

  function start(tplSrc, logicScript, anchorEl) {
    /* helmet → head (번들 출력엔 helmet이 이미 head에 있어 여기 안 옴) */
    var hm = /<helmet>([\s\S]*?)<\/helmet>/.exec(tplSrc);
    if (hm) {
      tplSrc = tplSrc.replace(hm[0], '');
      var tmp = document.createElement('div');
      tmp.innerHTML = hm[1];
      while (tmp.firstChild) document.head.appendChild(tmp.firstChild);
    }

    /* props 기본값: data-props JSON의 각 키.default ($preview 제외) */
    var props = {};
    if (logicScript) {
      var pj = logicScript.getAttribute('data-props');
      if (pj) {
        var spec = JSON.parse(pj);
        for (var k in spec) if (k !== '$preview' && spec[k] && 'default' in spec[k]) props[k] = spec[k].default;
      }
    }

    var Component = DCLogic;
    if (logicScript && logicScript.textContent.trim()) {
      Component = new Function('DCLogic', logicScript.textContent + ';return Component;')(DCLogic);
    }
    var inst = new Component(props);
    if (!inst.state) inst.state = {};

    var ast = parseTpl(tplSrc);
    var container = document.createElement('div');
    container.setAttribute('data-dc-root', '');
    var mounted = false;

    function render() {
      var vals = inst.renderVals ? inst.renderVals() : {};
      var out = [];
      for (var i = 0; i < ast.children.length; i++) build(ast.children[i], vals, false, out);
      if (!mounted) {
        for (var j = 0; j < out.length; j++) container.appendChild(out[j]);
      } else {
        var freshBox = document.createElement('div');
        for (var j2 = 0; j2 < out.length; j2++) freshBox.appendChild(out[j2]);
        var la = [].slice.call(container.childNodes), fa = [].slice.call(freshBox.childNodes);
        for (var x = 0; x < fa.length; x++) {
          if (x < la.length) morph(la[x], fa[x]);
          else container.appendChild(fa[x]);
        }
        for (var y = la.length - 1; y >= fa.length; y--) container.removeChild(la[y]);
      }
    }

    inst.__dcRender = function () { try { render(); } catch (e) { fail(e); } };
    render();
    anchorEl.replaceWith(container);
    mounted = true;
    if (inst.componentDidMount) inst.componentDidMount();
    if (inst.componentWillUnmount) {
      window.addEventListener('pagehide', function () { inst.componentWillUnmount(); });
    }
  }

  function boot() {
    try {
      var tplScript = document.querySelector('script[type="text/x-dc-template"]');
      var logicScript = document.querySelector('script[type="text/x-dc"]');
      if (tplScript) { start(tplScript.textContent, logicScript, tplScript); return; }
      var xdc = document.querySelector('x-dc');
      if (!xdc) return;
      fetch(location.href)
        .then(function (r) { return r.text(); })
        .then(function (txt) {
          var mm = /<x-dc>([\s\S]*?)<\/x-dc>/.exec(txt);
          start(mm ? mm[1] : xdc.innerHTML, logicScript, xdc);
        })
        .catch(function () {
          console.warn('[dc] 원문 fetch 실패(file:// 직접 오픈?) — DOM 폴백. <table> 내 sc-for·SVG 속성이 깨질 수 있음. dc-compile 번들 또는 http 서빙 권장.');
          try { start(xdc.innerHTML, logicScript, xdc); } catch (e) { fail(e); }
        });
    } catch (e) { fail(e); }
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot);
  else boot();
})();

</script>
</body>
</html>
