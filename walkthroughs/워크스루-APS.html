<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>워크스루 — APS 생산계획 자동화</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,300..600,0..1,0" rel="stylesheet">
<style>
/* inlined: assets/canon-tokens.css */
/* canon-tokens.css — Claude Design 템플릿(.dc)이 기대하는 토큰 파일명.
   실체는 워크스페이스 SSoT 포인터 (plan workspace/0025 D5 — 값 복제 금지).
   raw .dc 라이브 프리뷰(http 서빙)가 이 상대경로를 로드하고,
   dc-compile.mjs는 @import를 따라가 최종 값을 번들에 인라인한다. */
/* =============================================================
   DESIGN CANON v2 — 문서 양식 공용 토큰 SSoT (plan workspace/0025)
   원본: 사용자 제작 Claude Design 템플릿 assets/템플릿/정본 쇼케이스.dc.html
   적용 대상: 모든 문서 산출물(교육·워크스루·이력서·보고서·기술문서).
   ERP React 앱(카테고리 1)은 대상 아님 — M3 --md-sys-* 체계 유지.

   사용법(Track B 자유양식):
     <link rel="stylesheet" href=".../design-tokens-canon-v2.css">
     <body> 안 최상위 래퍼에 class="canon" (+ data-theme="dark" 선택)
   Raw hex는 이 파일(토큰 정의부)에서만 허용 — 소비측은 var(--cn-*)만.
   v1(design-tokens-creative.css)·techspec.css는 legacy — 신규 사용 금지.
   ============================================================= */

.canon{
  --cn-primary:#3B82F6; --cn-primary-deep:#2563EB; --cn-link:#2563EB;
  --cn-bg:#f5f8fc; --cn-card:#ffffff; --cn-card-glass:rgba(255,255,255,.82);
  --cn-line:#e2e9f2; --cn-line-strong:#cbd7e4;
  --cn-ink:#1c2a3d; --cn-muted:#5b6b80; --cn-faint:#8b99ac;
  --cn-tint:#eaf1fb; --cn-tint-deep:#dbe7f9;
  --cn-purple:#8B5CF6; --cn-teal:#14B8A6; --cn-amber:#F59E0B; --cn-rose:#F43F5E; --cn-green:#10B981;
  --cn-code-bg:#f1f5fa; --cn-code-ink:#334155;
  --cn-shadow-1:0 1px 2px rgba(28,42,61,.05),0 2px 8px rgba(28,42,61,.04);
  --cn-shadow-2:0 2px 4px rgba(28,42,61,.05),0 10px 28px rgba(37,99,235,.08);
  --cn-mesh:radial-gradient(at 90% -4%,rgba(59,130,246,.09) 0,transparent 50%),radial-gradient(at 2% 100%,rgba(139,92,246,.08) 0,transparent 46%),#f5f8fc;
  --cn-ease:cubic-bezier(.2,0,0,1);
  --cn-grad-id:linear-gradient(135deg,#3B82F6,#7C3AED);
}
.canon[data-theme="dark"]{
  --cn-primary:#6EA3F7; --cn-primary-deep:#8AB4F8; --cn-link:#8AB4F8;
  --cn-bg:#0e1420; --cn-card:#161e2e; --cn-card-glass:rgba(22,30,46,.82);
  --cn-line:#243146; --cn-line-strong:#31415c;
  --cn-ink:#e8edf6; --cn-muted:#98a8bf; --cn-faint:#67788f;
  --cn-tint:#1a2740; --cn-tint-deep:#20304f;
  --cn-code-bg:#111a2a; --cn-code-ink:#b7c5da;
  --cn-shadow-1:0 1px 2px rgba(0,0,0,.3),0 2px 8px rgba(0,0,0,.25);
  --cn-shadow-2:0 2px 4px rgba(0,0,0,.3),0 12px 30px rgba(0,0,0,.4);
  --cn-mesh:radial-gradient(at 90% -4%,rgba(59,130,246,.12) 0,transparent 50%),radial-gradient(at 2% 100%,rgba(139,92,246,.1) 0,transparent 46%),#0e1420;
}

/* ── 베이스 (쇼케이스 helmet 규칙 승계) ── */
.canon{
  min-height:100vh;background:var(--cn-mesh);background-attachment:fixed;
  color:var(--cn-ink);font-size:15px;line-height:1.7;
  font-family:'Pretendard Variable',Pretendard,'Noto Sans KR',sans-serif;
  -webkit-font-smoothing:antialiased;
  transition:background .25s,color .25s;
}
.canon a{color:var(--cn-link);text-decoration:none}
.canon a:hover{color:var(--cn-primary)}
.canon .mi{font-family:'Material Symbols Outlined';font-weight:normal;font-style:normal;line-height:1;display:inline-block;vertical-align:-0.15em;font-variation-settings:'FILL' 0,'wght' 400}

/* ── 인쇄 (DESIGN.md §3E) — 다크로 보던 중 인쇄해도 종이는 라이트 ── */
@media print{
  .canon,.canon[data-theme="dark"]{
    --cn-primary:#3B82F6; --cn-primary-deep:#2563EB; --cn-link:#2563EB;
    --cn-bg:#ffffff; --cn-card:#ffffff; --cn-card-glass:#ffffff;
    /* 그림자 소실 → 보더가 경계 승계(한 단계 진하게) */
    --cn-line:#cbd7e4; --cn-line-strong:#9fb1c5;
    --cn-ink:#1c2a3d; --cn-muted:#5b6b80; --cn-faint:#8b99ac;
    --cn-tint:#eaf1fb; --cn-tint-deep:#dbe7f9;
    --cn-code-bg:#f1f5fa; --cn-code-ink:#334155;
    --cn-shadow-1:none; --cn-shadow-2:none;
    --cn-mesh:#ffffff;
    background:#fff;
  }
}


</style>
<style>
html,body{margin:0;padding:0}
body{font-family:'Pretendard Variable',Pretendard,'Noto Sans KR',sans-serif;-webkit-font-smoothing:antialiased}
a{color:var(--cn-link,#2563EB);text-decoration:none}
a:hover{color:var(--cn-primary,#3B82F6)}
.mi{font-family:'Material Symbols Outlined';font-weight:normal;font-style:normal;line-height:1;display:inline-block;vertical-align:-0.15em;font-variation-settings:'FILL' 0,'wght' 400}
@media (max-width:960px){ .cn-rail{display:none!important} .cn-main{padding-left:32px!important} }
@keyframes cnFlow{to{background-position:24px 0}}
svg text{font-family:'Pretendard Variable',Pretendard,'Noto Sans KR',sans-serif}
svg .mono{font-family:'JetBrains Mono',monospace}
</style>
</head>
<body>
<!-- dc-compile.mjs 번들 (plan workspace/0025) — 원본: 워크스루-APS.dc.html · 재편집은 원본 .dc에서 -->
<script type="text/x-dc-template">
<div class="canon" data-theme="{{ theme }}" style="min-height:100vh;background:var(--cn-mesh);background-attachment:fixed;color:var(--cn-ink);font-size:15px;line-height:1.7;transition:background .25s,color .25s">

  <nav class="cn-rail" style="position:fixed;top:0;left:0;bottom:0;width:236px;box-sizing:border-box;padding:20px 14px;display:flex;flex-direction:column;gap:2px;background:var(--cn-card-glass);backdrop-filter:blur(14px);border-right:1px solid var(--cn-line);z-index:50">
    <div style="display:flex;align-items:center;gap:10px;padding:4px 8px 14px;border-bottom:1px solid var(--cn-line);margin-bottom:10px">
      <div style="width:32px;height:32px;border-radius:9px;display:grid;place-items:center;color:#fff;background:var(--cn-grad-id,linear-gradient(135deg,#3B82F6,#7C3AED));flex:none"><span class="mi" style="font-size:18px">precision_manufacturing</span></div>
      <div>
        <div style="font-size:13.5px;font-weight:800;letter-spacing:-.01em">APS 생산계획 자동화</div>
        <div style="font-size:10.5px;color:var(--cn-faint);font-family:'JetBrains Mono',monospace">schedule_calc.py</div>
      </div>
    </div>
    <div style="font-size:10px;font-weight:700;letter-spacing:.08em;color:var(--cn-faint);text-transform:uppercase;padding:8px 10px 4px">목차</div>
    <sc-for list="{{ navItems }}" as="nv" hint-placeholder-count="8">
      <a href="{{ nv.href }}" style="display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:8px;font-size:12.5px;font-weight:600;color:var(--cn-ink)" style-hover="background:var(--cn-tint);color:var(--cn-primary-deep)">
        <span class="mi" style="font-size:16px;color:var(--cn-primary)">{{ nv.icon }}</span>{{ nv.label }}
      </a>
    </sc-for>
    <div style="flex:1"></div>
    <a href="../index.html" style="display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:8px;font-size:12.5px;font-weight:600;color:var(--cn-muted)" style-hover="background:var(--cn-tint);color:var(--cn-primary-deep)">
      <span class="mi" style="font-size:16px;color:var(--cn-primary)">arrow_back</span>포트폴리오 홈
    </a>
    <button onClick="{{ toggleTheme }}" style="display:flex;align-items:center;justify-content:center;gap:7px;padding:9px 14px;border-radius:999px;border:1px solid var(--cn-line-strong);background:var(--cn-card);color:var(--cn-ink);font-family:inherit;font-size:12px;font-weight:700;cursor:pointer" style-hover="border-color:var(--cn-primary)">
      <span class="mi" style="font-size:16px">{{ themeIcon }}</span>{{ themeLabel }}
    </button>
  </nav>

  <main class="cn-main" style="padding:44px 40px 90px 284px;max-width:1280px;margin:0 auto;box-sizing:border-box">

    <header style="border-radius:18px;padding:34px 36px;margin-bottom:20px;position:relative;overflow:hidden;background:linear-gradient(120deg,var(--cn-tint) 0%,var(--cn-bg) 70%);border:1px solid var(--cn-line);box-shadow:var(--cn-shadow-1)">
      <div style="position:absolute;inset:0 0 auto 0;height:3px;background:linear-gradient(90deg,var(--cn-primary),var(--cn-purple),var(--cn-teal))"></div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:11.5px;font-weight:600;color:var(--cn-primary-deep);letter-spacing:.04em;margin-bottom:10px">WALKTHROUGH · 생산 도메인 · 결정론 엔진</div>
      <h1 style="margin:0 0 10px;font-size:34px;font-weight:800;letter-spacing:-.025em;line-height:1.25">APS 생산계획 자동화</h1>
      <p style="margin:0;max-width:680px;font-size:15px;color:var(--cn-muted)">발주가 들어오면 <b style="color:var(--cn-ink)">"무엇을 · 며칠에 · 얼마나"</b> 만들지를
        <b style="color:var(--cn-ink)">결정론(기계적) 로직</b>이 자동으로 계산해 생산계획에 올립니다. 핵심은 자동화의 양이 아니라
        <b style="color:var(--cn-ink)">소유권</b> — 계산·제안은 100% 프로그램이, 돈과 사람이 걸린 <b style="color:var(--cn-ink)">확정(commit)</b>은 관리부가 맡습니다.</p>
      <div style="display:flex;gap:8px;margin-top:18px;flex-wrap:wrap">
        <span style="font-size:11px;font-weight:700;padding:4px 12px;border-radius:999px;background:var(--cn-tint-deep);color:var(--cn-primary-deep)">결정론 엔진</span>
        <span style="font-size:11px;font-weight:700;padding:4px 12px;border-radius:999px;background:var(--cn-tint-deep);color:var(--cn-primary-deep)">생산지시서 40분→1클릭</span>
        <span style="font-size:11px;font-weight:700;padding:4px 12px;border-radius:999px;background:var(--cn-tint-deep);color:var(--cn-primary-deep)">읽기 6분</span>
      </div>
    </header>

    <div style="border-radius:12px;border:1px solid var(--cn-line);border-left:4px solid var(--cn-primary);background:var(--cn-card);padding:16px 19px;box-shadow:var(--cn-shadow-1);margin-bottom:44px;display:flex;gap:12px;align-items:flex-start">
      <span class="mi" style="font-size:20px;color:var(--cn-primary);flex:none;margin-top:2px">bolt</span>
      <div style="font-size:13px;line-height:1.75;color:var(--cn-muted)">
        <b style="color:var(--cn-ink)">TL;DR</b> —
        <b style="color:var(--cn-ink)">무엇</b>: 발주 잔량을 가용재고로 네팅하고 그리디 EDD 스케줄러가 날짜축을 채워 추천 큐를 만들면, 확정만 관리부 승인 게이트를 거칩니다. ·
        <b style="color:var(--cn-ink)">왜</b>: 계산 전부를 자동화해도 잔업·displace처럼 인건비·현장부담이 걸린 결정까지 기계가 단독 확정하면 위험합니다 — 계산과 확정의 소유권을 분리해야 "기본은 다 잡고 예외만 사람"이 성립합니다. ·
        <b style="color:var(--cn-ink)">결과</b>: 생산지시서 건당 40분 → 1클릭, 추천 큐·급발주 두 화면이 같은 엔진을 공유해 계산이 항상 일치합니다.
      </div>
    </div>

    <section id="s1" style="margin-bottom:48px">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:6px">
        <div style="width:30px;height:30px;border-radius:8px;display:grid;place-items:center;color:#fff;font-size:13px;font-weight:800;background:linear-gradient(135deg,#3B82F6,#2563EB)">1</div>
        <h2 style="margin:0;font-size:21px;font-weight:800;letter-spacing:-.02em">결정론 엔진 — 발주 잔량에서 생산지시서까지</h2>
      </div>
      <p style="margin:0 0 18px 42px;font-size:12.5px;color:var(--cn-faint)">가운데 ①~④는 사람 개입 0으로 매번 똑같이 돕니다. 아래 재생으로 단계별 설명을 볼 수 있습니다.</p>

      <div style="background:var(--cn-card);border:1px solid var(--cn-line);border-radius:14px;padding:24px;box-shadow:var(--cn-shadow-1)">
        <svg viewBox="0 0 1000 480" style="width:100%;height:auto;display:block">
          <defs>
            <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
              <path d="M0,0 L10,5 L0,10 z" fill="var(--cn-faint)"></path>
            </marker>
            <marker id="arrP" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
              <path d="M0,0 L10,5 L0,10 z" fill="var(--cn-primary)"></path>
            </marker>
          </defs>

          <text x="16" y="34" font-size="10.5" font-weight="700" letter-spacing="2" fill="var(--cn-faint)" class="mono">STAGE 1 → 5</text>
          <rect x="800" y="16" width="184" height="30" rx="15" fill="var(--cn-tint-deep)"></rect>
          <text x="892" y="36" text-anchor="middle" font-size="11" font-weight="700" fill="var(--cn-primary-deep)" class="mono">생산지시서 40분 → 1클릭</text>

          <!-- 루프백: 재최적화 -->
          <path d="M 895 140 C 895 92, 494 92, 494 138" fill="none" stroke="var(--cn-faint)" stroke-width="1.4" stroke-dasharray="6 5" marker-end="url(#arr)"></path>
          <text x="690" y="88" text-anchor="middle" font-size="10" fill="var(--cn-faint)">전 수평선 재최적화(0146) — 착수봉인·D0/D1 제외</text>

          <!-- ① 잔량 -->
          <rect x="16" y="150" width="168" height="72" rx="12" fill="var(--cn-card)" stroke="var(--cn-line-strong)"></rect>
          <text x="100" y="180" text-anchor="middle" font-size="13" font-weight="800" fill="var(--cn-ink)">① 잔량</text>
          <text x="100" y="200" text-anchor="middle" font-size="10" fill="var(--cn-muted)" class="mono">발주·수주 want_date</text>
          <line x1="184" y1="186" x2="206" y2="186" stroke="var(--cn-faint)" stroke-width="1.6" marker-end="url(#arr)"></line>

          <!-- ② 네팅 -->
          <rect x="210" y="150" width="168" height="72" rx="12" fill="var(--cn-card)" stroke="var(--cn-line-strong)"></rect>
          <text x="294" y="180" text-anchor="middle" font-size="13" font-weight="800" fill="var(--cn-ink)">② 네팅</text>
          <text x="294" y="200" text-anchor="middle" font-size="10" fill="var(--cn-muted)" class="mono">EDD순 배분</text>
          <line x1="378" y1="186" x2="400" y2="186" stroke="var(--cn-faint)" stroke-width="1.6" marker-end="url(#arr)"></line>

          <!-- 가용재고 입력 -->
          <rect x="140" y="290" width="180" height="56" rx="10" fill="var(--cn-bg)" stroke="var(--cn-line-strong)"></rect>
          <text x="230" y="314" text-anchor="middle" font-size="11" font-weight="700" fill="var(--cn-ink)">가용재고</text>
          <text x="230" y="332" text-anchor="middle" font-size="9.5" fill="var(--cn-muted)" class="mono">SUM(qty) − 예약</text>
          <path d="M 250 290 C 260 265, 275 245, 292 224" fill="none" stroke="var(--cn-faint)" stroke-width="1.3" stroke-dasharray="5 4" marker-end="url(#arr)"></path>

          <!-- ③ 시간표 계산 -->
          <rect x="404" y="150" width="180" height="72" rx="12" fill="var(--cn-card)" stroke="var(--cn-line-strong)"></rect>
          <text x="494" y="180" text-anchor="middle" font-size="13" font-weight="800" fill="var(--cn-ink)">③ 시간표 계산</text>
          <text x="494" y="200" text-anchor="middle" font-size="10" fill="var(--cn-muted)" class="mono">BOM · 능력모델 그리디</text>
          <line x1="584" y1="186" x2="606" y2="186" stroke="var(--cn-primary)" stroke-width="1.8" marker-end="url(#arrP)"></line>

          <!-- ④ 추천 큐 -->
          <rect x="610" y="150" width="170" height="72" rx="12" fill="var(--cn-card)" stroke="var(--cn-line-strong)"></rect>
          <text x="695" y="180" text-anchor="middle" font-size="13" font-weight="800" fill="var(--cn-ink)">④ 추천 큐</text>
          <text x="695" y="200" text-anchor="middle" font-size="10" fill="var(--cn-muted)" class="mono">읽기전용 · 제안</text>
          <line x1="780" y1="186" x2="802" y2="186" stroke="var(--cn-primary)" stroke-width="1.8" marker-end="url(#arrP)"></line>

          <!-- ⑤ 생산지시서 (강조 게이트) -->
          <rect x="806" y="140" width="178" height="92" rx="14" fill="var(--cn-tint)" stroke="var(--cn-primary)" stroke-width="2"></rect>
          <text x="895" y="170" text-anchor="middle" font-size="13.5" font-weight="800" fill="var(--cn-primary-deep)">⑤ 생산지시서</text>
          <text x="895" y="190" text-anchor="middle" font-size="10.5" fill="var(--cn-primary-deep)" class="mono">관리부 승인 1클릭</text>
          <text x="895" y="208" text-anchor="middle" font-size="10" fill="var(--cn-muted)">확정(commit) — 유일 쓰기</text>

          <!-- 게이트 → 파생 -->
          <line x1="895" y1="232" x2="895" y2="370" stroke="var(--cn-primary)" stroke-width="1.8" marker-end="url(#arrP)"></line>

          <!-- 파생 스트립 -->
          <rect x="16" y="378" width="968" height="82" rx="12" fill="var(--cn-bg)" stroke="var(--cn-line-strong)"></rect>
          <text x="36" y="406" font-size="12.5" font-weight="800" fill="var(--cn-ink)">파생 계산 — 결정론 엔진, 사람 개입 0(①~④ 구간)</text>
          <text x="36" y="430" font-size="11" fill="var(--cn-muted)" class="mono">필요수량 = max(0, 발주수량 − 가용재고) · 그리디 EDD로 날짜축을 하루씩 채움 · 시간축·수량천장 2한도 적용</text>
          <text x="36" y="450" font-size="10" fill="var(--cn-faint)">가용재고는 pp_stock_movements SUM에서 파생 · "완료일 D+2" 같은 값은 어디에도 저장하지 않고 스케줄에서 그때그때 도출</text>
        </svg>
      </div>

      <div style="background:var(--cn-card);border:1px solid var(--cn-line);border-radius:14px;padding:24px;box-shadow:var(--cn-shadow-1);margin-top:14px">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap">
          <div style="font-size:12px;font-weight:700;color:var(--cn-muted);margin-right:auto">단계별 보기 — 노드를 클릭하거나 '다음'으로 넘기세요</div>
          <div style="font-family:'JetBrains Mono',monospace;font-size:11.5px;font-weight:700;color:var(--cn-muted)">{{ flowStepText }}</div>

        <div style="margin-top:16px;border-radius:10px;background:var(--cn-tint);padding:12px 16px;font-size:12.5px;color:var(--cn-ink);display:flex;gap:9px;align-items:flex-start">

    <section id="s2" style="margin-bottom:48px">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:6px">
        <div style="width:30px;height:30px;border-radius:8px;display:grid;place-items:center;color:#fff;font-size:13px;font-weight:800;background:linear-gradient(135deg,#8B5CF6,#7C3AED)">2</div>
        <h2 style="margin:0;font-size:21px;font-weight:800;letter-spacing:-.02em">소유권 분리 — "과한 자동화"와 모순이 아니다</h2>
      </div>
      <p style="margin:0 0 18px 42px;font-size:12.5px;color:var(--cn-faint)">자동화를 늘리는 게 목표가 아니라, 계산(제안)과 확정(commit)을 쪼개는 게 설계의 뼈대입니다.</p>
      <div style="background:var(--cn-card);border:1px solid var(--cn-line);border-radius:14px;box-shadow:var(--cn-shadow-1);overflow:hidden;margin-left:42px">
        <table style="width:100%;border-collapse:collapse;font-size:12.5px">

            </tr>

          <tbody>
            <sc-for list="{{ ownershipRows }}" as="o" hint-placeholder-count="3">
              <tr style="border-top:1px solid var(--cn-line)" style-hover="background:var(--cn-tint)">

                <td style="padding:11px 16px;color:var(--cn-muted);vertical-align:top">{{ o.what }}</td>
                <td style="padding:11px 16px;color:var(--cn-muted);font-size:11.5px;white-space:nowrap;vertical-align:top">{{ o.trait }}</td>
              </tr>
            </sc-for>
          </tbody>
        </table>
      </div>
      <div style="margin-top:14px;margin-left:42px;border-radius:12px;border:1px solid var(--cn-line);border-left:4px solid var(--cn-purple);background:var(--cn-card);padding:14px 17px;box-shadow:var(--cn-shadow-1);display:flex;gap:11px;align-items:flex-start">
        <span class="mi" style="font-size:19px;color:var(--cn-purple);flex:none;margin-top:1px">lightbulb</span>
        <div style="font-size:12.5px;line-height:1.65;color:var(--cn-muted)">가르는 축은 "자동화의 양"이 아니라 <b style="color:var(--cn-ink)">소유권</b>입니다. 계산·제안은 항상 프로그램이(사람 개입 0), 돈과 사람이 걸린 확정은 관리부가 — 이렇게 나누면 "프로그램이 기본을 다 잡고, 사람은 예외만 본다"가 성립합니다. 자동 확정 범위는 신뢰가 쌓인 뒤 저위험 작업부터 점진 확대합니다.</div>
      </div>
    </section>

    <section id="s3" style="margin-bottom:48px">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:6px">
        <div style="width:30px;height:30px;border-radius:8px;display:grid;place-items:center;color:#fff;font-size:13px;font-weight:800;background:linear-gradient(135deg,#14B8A6,#0D9488)">3</div>
        <h2 style="margin:0;font-size:21px;font-weight:800;letter-spacing:-.02em">능력 모델 — 하루 한도의 결정론 로직 (2축)</h2>
      </div>
      <p style="margin:0 0 18px 42px;font-size:12.5px;color:var(--cn-faint)">시간축(모든 제품) + 수량천장(두꺼운 1종) — 두 한도가 동시에 걸립니다.</p>
      <div style="background:var(--cn-card);border:1px solid var(--cn-line);border-radius:14px;box-shadow:var(--cn-shadow-1);overflow:hidden;margin-left:42px">
        <table style="width:100%;border-collapse:collapse;font-size:12.5px">
          <thead>
            <tr style="background:var(--cn-tint)">
              <th style="text-align:left;padding:11px 16px;font-size:11px;font-weight:800;letter-spacing:.04em;color:var(--cn-primary-deep)">한도 축</th>
              <th style="text-align:left;padding:11px 16px;font-size:11px;font-weight:800;letter-spacing:.04em;color:var(--cn-primary-deep)">로직</th>
              <th style="text-align:left;padding:11px 16px;font-size:11px;font-weight:800;letter-spacing:.04em;color:var(--cn-primary-deep)">비고</th>

          </thead>
          <tbody>
            <sc-for list="{{ capacityRows }}" as="c" hint-placeholder-count="2">
              <tr style="border-top:1px solid var(--cn-line)" style-hover="background:var(--cn-tint)">
                <td style="padding:11px 16px;font-weight:700;white-space:nowrap;vertical-align:top">{{ c.axis }}</td>
                <td style="padding:11px 16px;color:var(--cn-muted);vertical-align:top">{{ c.logic }}</td>
                <td style="padding:11px 16px;color:var(--cn-muted);font-size:11.5px;white-space:nowrap;vertical-align:top">{{ c.note }}</td>
              </tr>
            </sc-for>
          </tbody>
        </table>
      </div>
      <div style="margin-top:14px;margin-left:42px;border-radius:12px;border:1px solid var(--cn-line);border-left:4px solid var(--cn-teal);background:var(--cn-card);padding:14px 17px;box-shadow:var(--cn-shadow-1);display:flex;gap:11px;align-items:flex-start">
        <span class="mi" style="font-size:19px;color:var(--cn-teal);flex:none;margin-top:1px">school</span>
        <div style="font-size:12.5px;line-height:1.65;color:var(--cn-muted)">1종 천장은 사람이 정한 숫자가 아니라 <b style="color:var(--cn-ink)">데이터에서 학습</b>합니다 — 18개월 실적(eCount)에서 두께별 일일 출력 천장을 추정. 신뢰 가능한 값은
          <span style="font-family:'JetBrains Mono',monospace;color:var(--cn-primary-deep);font-weight:700">100T=216장 · 110T=302장 · 150T=112장</span>(연속 이월 패턴으로 교정). 나머지 두께는 데이터가 희소해 보수적 기본값+저신뢰 플래그로 두고, 라이브 데이터가 쌓이면 자동 보정합니다(임계 두께는 현장 확인 게이트).</div>
      </div>
    </section>

    <section id="s4" style="margin-bottom:48px">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:6px">
        <div style="width:30px;height:30px;border-radius:8px;display:grid;place-items:center;color:#fff;font-size:13px;font-weight:800;background:linear-gradient(135deg,#F59E0B,#D97706)">4</div>
        <h2 style="margin:0;font-size:21px;font-weight:800;letter-spacing:-.02em">발주 하나가 배치되는 과정 — 백로그는 줄고, 완료일이 잡힌다</h2>
      </div>
      <p style="margin:0 0 18px 42px;font-size:12.5px;color:var(--cn-faint)">2종 100T 발주가 네팅 후 900장 남은 예시. bal은 아직 배치 안 된 잔량 — 매번 파생값입니다.</p>
      <div style="background:var(--cn-card);border:1px solid var(--cn-line);border-radius:14px;padding:22px 24px;box-shadow:var(--cn-shadow-1);margin-left:42px">
        <div style="display:flex;align-items:stretch;gap:10px;overflow-x:auto;padding-bottom:4px">
          <sc-for list="{{ batchSteps }}" as="b" hint-placeholder-count="4">
            <div style="display:flex;align-items:center;gap:10px;flex:{{ b.flex }}">
              <div style="background:var(--cn-card);border:1.5px solid var(--cn-primary);border-radius:12px;padding:14px 16px;min-width:150px">
                <div style="font-family:'JetBrains Mono',monospace;font-size:10.5px;font-weight:700;color:var(--cn-primary-deep);letter-spacing:.04em">{{ b.day }}</div>
                <div style="font-size:12px;font-weight:700;color:var(--cn-ink);margin:4px 0 10px">{{ b.label }}</div>
                <div style="display:flex;align-items:baseline;gap:7px">
                  <span style="font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:800;color:{{ b.deltaColor }}">{{ b.delta }}</span>
                  <span style="font-family:'JetBrains Mono',monospace;font-size:21px;font-weight:800;color:var(--cn-primary-deep)">{{ b.bal }}</span>
                </div>
                <div style="font-size:10px;color:var(--cn-faint);margin-top:7px">{{ b.note }}</div>
              </div>
              <sc-if value="{{ b.hasConn }}" hint-placeholder-val="{{ true }}">
                <span class="mi" style="font-size:20px;color:var(--cn-faint);flex:none">arrow_forward</span>
              </sc-if>
            </div>
          </sc-for>
        </div>
      </div>
      <div style="margin-top:14px;margin-left:42px;border-radius:12px;border:1px solid var(--cn-line);border-left:4px solid var(--cn-amber);background:var(--cn-card);padding:14px 17px;box-shadow:var(--cn-shadow-1);display:flex;gap:11px;align-items:flex-start">
        <span class="mi" style="font-size:19px;color:var(--cn-amber);flex:none;margin-top:1px">timeline</span>
        <div style="font-size:12.5px;line-height:1.65;color:var(--cn-muted)">신규 발주는 빈 라인이 아니라 <b style="color:var(--cn-ink)">이미 확정된 생산부하 위에 증분</b>으로 쌓여서 시작일·리드타임·잔업 판정이 현실값이 됩니다. 잔량이 0이 되는 날이 <b style="color:var(--cn-ink)">완료일</b>이고, 오늘~완료일이 <b style="color:var(--cn-ink)">리드타임</b>입니다 — 어디에도 "완료일 D+2"를 저장하지 않았는데 스케줄에서 저절로 나옵니다.</div>
      </div>
    </section>

    <section id="s5" style="margin-bottom:48px">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:6px">
        <div style="width:30px;height:30px;border-radius:8px;display:grid;place-items:center;color:#fff;font-size:13px;font-weight:800;background:linear-gradient(135deg,#F43F5E,#E11D48)">5</div>
        <h2 style="margin:0;font-size:21px;font-weight:800;letter-spacing:-.02em">전 수평선 재최적화 + 안전핀 3중</h2>
      </div>
      <p style="margin:0 0 18px 42px;font-size:12.5px;color:var(--cn-faint)">apply(자동반영)는 미편입 백로그만 끼워넣지 않고, 비고정 확정행까지 매번 전 수평선을 재최적화합니다(0146 결정 A). 대신 함부로 못 바꾸게 세 겹 안전핀을 겁니다.</p>
      <div style="background:var(--cn-card);border:1px solid var(--cn-line);border-radius:14px;box-shadow:var(--cn-shadow-1);overflow:hidden;margin-left:42px">
        <table style="width:100%;border-collapse:collapse;font-size:12.5px">
          <thead>
            <tr style="background:var(--cn-tint)">
              <th style="text-align:left;padding:11px 16px;font-size:11px;font-weight:800;letter-spacing:.04em;color:var(--cn-primary-deep)">안전핀</th>
              <th style="text-align:left;padding:11px 16px;font-size:11px;font-weight:800;letter-spacing:.04em;color:var(--cn-primary-deep)">무엇</th>
              <th style="text-align:left;padding:11px 16px;font-size:11px;font-weight:800;letter-spacing:.04em;color:var(--cn-primary-deep)">누가 해제</th>
            </tr>
          </thead>
          <tbody>
            <sc-for list="{{ safetyPins }}" as="p" hint-placeholder-count="3">
              <tr style="border-top:1px solid var(--cn-line)" style-hover="background:var(--cn-tint)">
                <td style="padding:11px 16px;font-weight:700;white-space:nowrap;vertical-align:top">{{ p.name }}</td>
                <td style="padding:11px 16px;color:var(--cn-muted);vertical-align:top">{{ p.what }}</td>
                <td style="padding:11px 16px;font-weight:700;color:var(--cn-primary-deep);white-space:nowrap;vertical-align:top">{{ p.who }}</td>
              </tr>
            </sc-for>
          </tbody>
        </table>
      </div>
      <div style="margin-top:14px;margin-left:42px;border-radius:12px;border:1px solid var(--cn-line);border-left:4px solid var(--cn-rose);background:var(--cn-card);padding:14px 17px;box-shadow:var(--cn-shadow-1);display:flex;gap:11px;align-items:flex-start">
        <span class="mi" style="font-size:19px;color:var(--cn-rose);flex:none;margin-top:1px">undo</span>
        <div style="font-size:12.5px;line-height:1.65;color:var(--cn-muted)">모든 변이는 되돌릴 수 있습니다 — displace·재최적화 apply는 실행 직전 <b style="color:var(--cn-ink)">전체 스냅샷</b>(<code style="font-family:'JetBrains Mono',monospace;color:var(--cn-primary-deep)">pp_displace_op</code>)을 남겨 "직전 작업 취소"로 완전 역연산(interim undo)합니다. 계획 작업 이력·undo 종합 콘솔(0153)이 얹혀 계획 변이 5경로가 모두 감사로그(<code style="font-family:'JetBrains Mono',monospace;color:var(--cn-primary-deep)">plan_op</code>)에 기록되고, 되돌리기는 <b style="color:var(--cn-ink)">LIFO 최신 op · 당일 · 미마감</b>일 때만, 그것도 관리부 전용 권한(<code style="font-family:'JetBrains Mono',monospace;color:var(--cn-primary-deep)">plan_op:undo</code>)으로 열립니다.</div>
      </div>
    </section>

    <section id="s6" style="margin-bottom:48px">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:6px">
        <div style="width:30px;height:30px;border-radius:8px;display:grid;place-items:center;color:#fff;font-size:13px;font-weight:800;background:linear-gradient(135deg,#06B6D4,#0891B2)">6</div>
        <h2 style="margin:0;font-size:21px;font-weight:800;letter-spacing:-.02em">자동 ↔ 사람 경계 · AI의 역할</h2>
      </div>
      <p style="margin:0 0 18px 42px;font-size:12.5px;color:var(--cn-faint)">동작별 정리 — 숫자는 AI가 만들지 않습니다.</p>
      <div style="background:var(--cn-card);border:1px solid var(--cn-line);border-radius:14px;box-shadow:var(--cn-shadow-1);overflow:hidden;margin-left:42px">
        <table style="width:100%;border-collapse:collapse;font-size:12.5px">
          <thead>
            <tr style="background:var(--cn-tint)">
              <th style="text-align:left;padding:11px 16px;font-size:11px;font-weight:800;letter-spacing:.04em;color:var(--cn-primary-deep)">동작</th>
              <th style="text-align:left;padding:11px 16px;font-size:11px;font-weight:800;letter-spacing:.04em;color:var(--cn-primary-deep)">구분</th>
              <th style="text-align:left;padding:11px 16px;font-size:11px;font-weight:800;letter-spacing:.04em;color:var(--cn-primary-deep)">이유 / 조건</th>

          </thead>
          <tbody>
            <sc-for list="{{ boundaryRows }}" as="bd" hint-placeholder-count="8">
              <tr style="border-top:1px solid var(--cn-line)" style-hover="background:var(--cn-tint)">
                <td style="padding:11px 16px;font-weight:700;vertical-align:top">{{ bd.action }}</td>
                <td style="padding:11px 16px;color:{{ bd.color }};font-weight:700;white-space:nowrap;vertical-align:top">{{ bd.kind }}</td>
                <td style="padding:11px 16px;color:var(--cn-muted);vertical-align:top">{{ bd.reason }}</td>
              </tr>
            </sc-for>
          </tbody>
        </table>
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:14px;margin-left:42px;margin-top:14px">
        <div style="border-radius:12px;border:1px solid var(--cn-line);border-left:4px solid var(--cn-primary);background:var(--cn-card);padding:14px 17px;box-shadow:var(--cn-shadow-1);display:flex;gap:11px;align-items:flex-start">
          <span class="mi" style="font-size:19px;color:var(--cn-primary);flex:none;margin-top:1px">smart_toy</span>
          <div style="font-size:12.5px;line-height:1.65;color:var(--cn-muted)">숫자·순서·잔업시간 = 결정론 코드. AI는 숫자를 정하지 않습니다. LLM은 엔진이 이미 확정한 충돌·트레이드오프를 <b style="color:var(--cn-ink)">자연어로 설명</b>하고("○○ 7/16분을 2일 밀거나 X일 잔업 4h 필요") 관리부 의사결정을 보조할 뿐이에요. 납기충돌·잔업필요 <b style="color:var(--cn-ink)">발생 시에만</b> 호출(저빈도·고가치) · <b style="color:var(--cn-ink)">$0 idle</b>(호출할 때만 과금) · 프롬프트가 "엔진 숫자를 바꾸지 마라"로 잠겨 있어 정확도는 아키텍처가 보장합니다.</div>
        </div>

        { q: "왜 1종 천장은 고정값이 아니라 데이터 학습인가?", pick: "18개월 실적에서 두께별 일일 천장 추정 + 저신뢰 플래그.", drop: "현장이 부른 단일 고정 숫자를 상수로 박기.", why: "1종 천장의 병목은 적재 노동이라 두께마다 다르고 계절·인원에 흔들린다. 고정값은 과대·과소약속으로 이어짐. 실측에서 학습하고 희소 두께는 보수적으로 두되 라이브 데이터로 자동 보정 — 임계 두께는 현장 확인 게이트." },

        { href: "워크스루-생산일지분해.html", icon: "account_tree", title: "생산일지 분해 (BOM)", body: "APS가 짜는 계획의 원료·시간이 어디서 오는지 — 1행이 7개 사건으로 분해되는 규칙." },
        { href: "워크스루-발주출고-SSoT.html", icon: "local_shipping", title: "발주·출고 SSoT", body: "APS가 계산한 완료일이 발주 스케줄·출고와 어떻게 맞물리는지." },
        { href: "워크스루-온톨로지.html", icon: "share", title: "온톨로지", body: "1종 천장 같은 추정 상수가 정합 레이어에서 어떻게 관리되는지." },

<script>
/* =============================================================
   DESIGN CANON v2 — .dc 템플릿 자체 렌더러 (plan workspace/0025 D3)
   Claude Design DSL 서브셋 구현: {{expr}} 보간 · sc-for · sc-if ·
   on* 이벤트 바인딩 · style-hover · DCLogic(state/setState/lifecycle).
   미지원 sc-* 태그는 조용히 넘기지 않고 명시적 에러(화면 배너 + throw).

   원문 취득 우선순위:
   ① <script type="text/x-dc-template"> — dc-compile.mjs 번들 출력 (권장 배포 형태)
   ② fetch(현재 URL) 원문 재취득 — http(s) 서빙된 raw .dc 라이브 프리뷰
   ③ DOM 폴백(경고) — file://로 raw .dc를 직접 연 경우. 브라우저 파서의
      foster-parenting 때문에 <table> 내 sc-for·SVG 대소문자 속성이 깨질 수 있음.

   왜 자체 파서인가: 브라우저 HTML 파서는 <tbody> 안의 <sc-for>를 표 밖으로
   끌어내(foster parenting) 표 템플릿을 구조적으로 파괴한다. 원문 텍스트를
   직접 파싱하면 이 문제와 SVG 속성 소문자화(viewBox)가 모두 회피된다.
   ============================================================= */
(function () {
  'use strict';

  /* raw .dc를 직접 열었을 때 미렌더 {{ }} 플래시 방지 */
  var hider = document.createElement('style');
  hider.textContent = 'x-dc{display:none}';
  (document.head || document.documentElement).appendChild(hider);

  var VOID = { area: 1, base: 1, br: 1, col: 1, embed: 1, hr: 1, img: 1, input: 1, link: 1, meta: 1, source: 1, track: 1, wbr: 1 };
  var SVG_NS = 'http://www.w3.org/2000/svg';

  function decodeEnt(s) {
    return s.replace(/&(amp|lt|gt|quot|#39|apos);/g, function (m, k) {
      return { amp: '&', lt: '<', gt: '>', quot: '"', '#39': "'", apos: "'" }[k];
    });
  }

  /* ── 미니 HTML 파서 → {tag, attrs, children} / {text} 트리 ── */
  function parseTpl(src) {
    var root = { tag: '#root', attrs: {}, children: [] };
    var stack = [root];
    var re = /<!--[\s\S]*?-->|<\/([a-zA-Z][\w-]*)\s*>|<([a-zA-Z][\w-]*)((?:\s+[^\s=\/>]+(?:\s*=\s*(?:"[^"]*"|'[^']*'|[^\s>]+))?)*)\s*(\/?)>/g;
    var last = 0, m;
    while ((m = re.exec(src))) {
      if (m.index > last) {
        var txt = src.slice(last, m.index);
        if (txt) stack[stack.length - 1].children.push({ text: decodeEnt(txt) });
      }
      last = re.lastIndex;
      if (m[0].slice(0, 4) === '<!--') continue;
      if (m[1]) { /* 닫는 태그 — 같은 이름을 찾을 때까지 pop */
        var closing = m[1].toLowerCase();
        for (var j = stack.length - 1; j > 0; j--) {
          if (stack[j].tag.toLowerCase() === closing) { stack.length = j; break; }
        }
      } else {
        var attrs = {}, ar = /([^\s=\/>]+)(?:\s*=\s*("([^"]*)"|'([^']*)'|([^\s>]+)))?/g, am;
        while ((am = ar.exec(m[3]))) {
          attrs[am[1]] = am[3] != null ? decodeEnt(am[3]) : am[4] != null ? decodeEnt(am[4]) : am[5] != null ? decodeEnt(am[5]) : '';
        }
        var node = { tag: m[2], attrs: attrs, children: [] };
        stack[stack.length - 1].children.push(node);
        if (!m[4] && !VOID[m[2].toLowerCase()]) stack.push(node);
      }
    }
    if (last < src.length) {
      var tail = src.slice(last);
      if (tail) stack[stack.length - 1].children.push({ text: decodeEnt(tail) });
    }
    return root;
  }

  /* ── 표현식 평가 ({{ }} 내부) — 스코프 체인은 프로토타입 체인으로 ── */
  var fnCache = {};
  function evalExpr(expr, scope) {
    var f = fnCache[expr] || (fnCache[expr] = new Function('__s', 'with(__s){return(' + expr + ')}'));
    try { return f(scope); }
    catch (e) { throw new Error('[dc] 표현식 평가 실패: {{ ' + expr + ' }} — ' + e.message); }
  }
  var MUSTACHE = /\{\{\s*([\s\S]+?)\s*\}\}/g;
  function interpolate(str, scope) {
    return str.replace(MUSTACHE, function (_, e) {
      var v = evalExpr(e, scope);
      return v == null ? '' : String(v);
    });
  }
  function soleExpr(str) {
    var m = /^\s*\{\{\s*([\s\S]+?)\s*\}\}\s*$/.exec(str);
    return m && m[1];
  }

  /* ── style-hover → 생성 클래스 (인라인 style은 :hover 불가) ── */
  var hoverMap = {}, hoverSeq = 0, hoverStyleEl = null;
  function hoverClass(css) {
    if (hoverMap[css]) return hoverMap[css];
    var cls = 'dc-hv' + (++hoverSeq);
    hoverMap[css] = cls;
    if (!hoverStyleEl) {
      hoverStyleEl = document.createElement('style');
      document.head.appendChild(hoverStyleEl);
    }
    hoverStyleEl.textContent += '.' + cls + ':hover{' + css + '}\n';
    return cls;
  }

  /* ── 트리 → DOM (out 배열에 push) ── */
  function build(node, scope, svgCtx, out) {
    if (node.text !== undefined) {
      out.push(document.createTextNode(node.text.indexOf('{{') >= 0 ? interpolate(node.text, scope) : node.text));
      return;
    }
    var tag = node.tag.toLowerCase();
    if (tag === 'sc-for') {
      var list = evalExpr(soleExpr(node.attrs.list || '') || 'null', scope) || [];
      var as = node.attrs.as || 'item';
      for (var i = 0; i < list.length; i++) {
        var s = Object.create(scope);
        s[as] = list[i];
        s[as + 'Index'] = i;
        for (var c = 0; c < node.children.length; c++) build(node.children[c], s, svgCtx, out);
      }
      return;
    }
    if (tag === 'sc-if') {
      if (evalExpr(soleExpr(node.attrs.value || '') || 'false', scope)) {
        for (var c2 = 0; c2 < node.children.length; c2++) build(node.children[c2], scope, svgCtx, out);
      }
      return;
    }
    if (tag.slice(0, 3) === 'sc-') {
      throw new Error('[dc] 미지원 DSL 태그: <' + node.tag + '> — support.js 서브셋(sc-for·sc-if)에 없음. 렌더러 확장 필요.');
    }
    var isSvg = svgCtx || tag === 'svg';
    var el = isSvg ? document.createElementNS(SVG_NS, node.tag) : document.createElement(tag);
    var events = null;
    for (var name in node.attrs) {
      var raw = node.attrs[name], lname = name.toLowerCase();
      if (lname.indexOf('hint-') === 0) continue;
      if (/^on[a-z]/.test(lname) && soleExpr(raw)) {
        var fn = evalExpr(soleExpr(raw), scope);
        if (typeof fn === 'function') { el[lname] = fn; (events = events || {})[lname] = fn; }
        continue;
      }
      if (lname === 'style-hover') {
        el.classList.add(hoverClass(raw.indexOf('{{') >= 0 ? interpolate(raw, scope) : raw));
        continue;
      }
      el.setAttribute(name, raw.indexOf('{{') >= 0 ? interpolate(raw, scope) : raw);
    }
    if (events) el.__dcEvents = events;
    var kids = [];
    for (var k = 0; k < node.children.length; k++) build(node.children[k], scope, isSvg, kids);
    for (var k2 = 0; k2 < kids.length; k2++) el.appendChild(kids[k2]);
    out.push(el);
  }

  /* ── 모프 (in-place 패치) — 전체 교체 대신 속성/텍스트만 갱신해
        CSS transition(게이지 채움·플로우 노드 점등 등)이 살아있게 한다 ── */
  function morph(live, fresh) {
    if (live.nodeType !== fresh.nodeType || (live.nodeType === 1 && live.nodeName !== fresh.nodeName)) {
      live.replaceWith(fresh);
      return;
    }
    if (live.nodeType === 3) {
      if (live.nodeValue !== fresh.nodeValue) live.nodeValue = fresh.nodeValue;
      return;
    }
    var i, a;
    for (i = live.attributes.length - 1; i >= 0; i--) {
      a = live.attributes[i];
      if (!fresh.hasAttribute(a.name)) live.removeAttribute(a.name);
    }
    for (i = 0; i < fresh.attributes.length; i++) {
      a = fresh.attributes[i];
      if (live.getAttribute(a.name) !== a.value) live.setAttribute(a.name, a.value);
    }
    var oe = live.__dcEvents || {}, ne = fresh.__dcEvents || {};
    for (var k1 in oe) if (!(k1 in ne)) live[k1] = null;
    for (var k2 in ne) live[k2] = ne[k2];
    live.__dcEvents = fresh.__dcEvents;
    var la = [].slice.call(live.childNodes), fa = [].slice.call(fresh.childNodes);
    for (i = 0; i < fa.length; i++) {
      if (i < la.length) morph(la[i], fa[i]);
      else live.appendChild(fa[i]);
    }
    for (i = la.length - 1; i >= fa.length; i--) live.removeChild(la[i]);
  }

  /* ── DCLogic 베이스 ── */
  function DCLogic(props) { this.props = props || {}; }
  DCLogic.prototype.setState = function (partial) {
    if (!this.state) this.state = {};
    Object.assign(this.state, partial);
    if (this.__dcRender) this.__dcRender();
  };

  function fail(e) {
    console.error(e);
    var box = document.createElement('div');
    box.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;background:#ba1a1a;color:#fff;font:600 13px/1.5 monospace;padding:10px 16px;white-space:pre-wrap';
    box.textContent = String(e && e.message || e);
    document.body.appendChild(box);
    throw e;
  }

  function start(tplSrc, logicScript, anchorEl) {
    /* helmet → head (번들 출력엔 helmet이 이미 head에 있어 여기 안 옴) */
    var hm = /<helmet>([\s\S]*?)<\/helmet>/.exec(tplSrc);
    if (hm) {
      tplSrc = tplSrc.replace(hm[0], '');
      var tmp = document.createElement('div');
      tmp.innerHTML = hm[1];
      while (tmp.firstChild) document.head.appendChild(tmp.firstChild);
    }

    /* props 기본값: data-props JSON의 각 키.default ($preview 제외) */
    var props = {};
    if (logicScript) {
      var pj = logicScript.getAttribute('data-props');
      if (pj) {
        var spec = JSON.parse(pj);
        for (var k in spec) if (k !== '$preview' && spec[k] && 'default' in spec[k]) props[k] = spec[k].default;
      }
    }

    var Component = DCLogic;
    if (logicScript && logicScript.textContent.trim()) {
      Component = new Function('DCLogic', logicScript.textContent + ';return Component;')(DCLogic);
    }
    var inst = new Component(props);
    if (!inst.state) inst.state = {};

    var ast = parseTpl(tplSrc);
    var container = document.createElement('div');
    container.setAttribute('data-dc-root', '');
    var mounted = false;

    function render() {
      var vals = inst.renderVals ? inst.renderVals() : {};
      var out = [];
      for (var i = 0; i < ast.children.length; i++) build(ast.children[i], vals, false, out);
      if (!mounted) {
        for (var j = 0; j < out.length; j++) container.appendChild(out[j]);
      } else {
        var freshBox = document.createElement('div');
        for (var j2 = 0; j2 < out.length; j2++) freshBox.appendChild(out[j2]);
        var la = [].slice.call(container.childNodes), fa = [].slice.call(freshBox.childNodes);
        for (var x = 0; x < fa.length; x++) {
          if (x < la.length) morph(la[x], fa[x]);
          else container.appendChild(fa[x]);
        }
        for (var y = la.length - 1; y >= fa.length; y--) container.removeChild(la[y]);
      }
    }

    inst.__dcRender = function () { try { render(); } catch (e) { fail(e); } };
    render();
    anchorEl.replaceWith(container);
    mounted = true;
    if (inst.componentDidMount) inst.componentDidMount();
    if (inst.componentWillUnmount) {
      window.addEventListener('pagehide', function () { inst.componentWillUnmount(); });
    }
  }

  function boot() {
    try {
      var tplScript = document.querySelector('script[type="text/x-dc-template"]');
      var logicScript = document.querySelector('script[type="text/x-dc"]');
      if (tplScript) { start(tplScript.textContent, logicScript, tplScript); return; }
      var xdc = document.querySelector('x-dc');
      if (!xdc) return;
      fetch(location.href)
        .then(function (r) { return r.text(); })
        .then(function (txt) {
          var mm = /<x-dc>([\s\S]*?)<\/x-dc>/.exec(txt);
          start(mm ? mm[1] : xdc.innerHTML, logicScript, xdc);
        })
        .catch(function () {
          console.warn('[dc] 원문 fetch 실패(file:// 직접 오픈?) — DOM 폴백. <table> 내 sc-for·SVG 속성이 깨질 수 있음. dc-compile 번들 또는 http 서빙 권장.');
          try { start(xdc.innerHTML, logicScript, xdc); } catch (e) { fail(e); }
        });
    } catch (e) { fail(e); }
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot);
  else boot();
})();

</script>
